<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>airss</title>
<meta name="description" content="A Reeder-style reader for full-text AI blog feeds.">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23d97742'/%3E%3Ccircle cx='21' cy='43' r='5.5' fill='%23fff'/%3E%3Cpath d='M16 28a20 20 0 0 1 20 20' stroke='%23fff' stroke-width='7' fill='none' stroke-linecap='round'/%3E%3Cpath d='M16 14a34 34 0 0 1 34 34' stroke='%23fff' stroke-width='7' fill='none' stroke-linecap='round'/%3E%3C/svg%3E">
<script>
try {
  var t = localStorage.getItem('airss.theme') ||
    (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
  document.documentElement.dataset.theme = t;
} catch (e) {}
</script>
<link rel="stylesheet" href="assets/style.css">
</head>
<body>
<div id="app">

  <aside id="sidebar">
    <div class="wordmark">
      <svg class="wordmark-icon" viewBox="0 0 64 64" aria-hidden="true"><rect width="64" height="64" rx="14" fill="var(--accent)"/><circle cx="21" cy="43" r="5.5" fill="#fff"/><path d="M16 28a20 20 0 0 1 20 20" stroke="#fff" stroke-width="7" fill="none" stroke-linecap="round"/><path d="M16 14a34 34 0 0 1 34 34" stroke="#fff" stroke-width="7" fill="none" stroke-linecap="round"/></svg>
      <span>airss</span>
    </div>
    <nav id="nav" aria-label="Feeds"></nav>
    <div class="sidebar-footer">
      <button id="theme-toggle" class="icon-btn" title="Toggle theme" aria-label="Toggle theme">
        <svg class="icon icon-sun" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="4.4"/><path d="M12 2.5v2.4M12 19.1v2.4M2.5 12h2.4M19.1 12h2.4M5.3 5.3l1.7 1.7M17 17l1.7 1.7M18.7 5.3L17 7M7 17l-1.7 1.7"/></svg>
        <svg class="icon icon-moon" viewBox="0 0 24 24" aria-hidden="true"><path d="M20.4 14.2A8.5 8.5 0 0 1 9.8 3.6a8.5 8.5 0 1 0 10.6 10.6Z"/></svg>
      </button>
      <a class="icon-btn" href="https://github.com/wuhx/airss" target="_blank" rel="noopener" title="Source on GitHub" aria-label="Source on GitHub">
        <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2.7a9.6 9.6 0 0 0-3 18.7c.5.1.6-.2.6-.5v-1.7c-2.7.6-3.2-1.3-3.2-1.3-.4-1.1-1-1.4-1-1.4-.9-.6.1-.6.1-.6 1 .1 1.5 1 1.5 1 .9 1.5 2.3 1 2.9.8.1-.6.3-1 .6-1.3-2.1-.2-4.4-1-4.4-4.7 0-1 .4-1.9 1-2.6-.1-.2-.4-1.2.1-2.5 0 0 .8-.3 2.6 1a9.2 9.2 0 0 1 4.8 0c1.8-1.3 2.6-1 2.6-1 .5 1.3.2 2.3.1 2.5.6.7 1 1.6 1 2.6 0 3.7-2.3 4.5-4.4 4.7.3.3.6.9.6 1.8v2.6c0 .3.2.6.7.5A9.6 9.6 0 0 0 12 2.7Z"/></svg>
      </a>
    </div>
  </aside>

  <section id="timeline">
    <header class="pane-header">
      <div class="pane-header-row">
        <button id="menu-btn" class="icon-btn" title="Feeds" aria-label="Show feeds">
          <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><rect x="3" y="4" width="18" height="16" rx="3"/><path d="M9.5 4v16"/></svg>
        </button>
        <h2 id="timeline-title">Home</h2>
      </div>
      <div class="search-wrap">
        <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><circle cx="11" cy="11" r="6.5"/><path d="m20.5 20.5-4.9-4.9"/></svg>
        <input id="search" type="search" placeholder="Filter articles" autocomplete="off" spellcheck="false">
      </div>
    </header>
    <div id="cards" role="list"></div>
  </section>

  <article id="reader">
    <header class="pane-header reader-toolbar">
      <button id="back-btn" class="icon-btn" title="Back" aria-label="Back to list">
        <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M14.5 5.5 8 12l6.5 6.5"/></svg>
      </button>
      <span class="spacer"></span>
      <button id="star-btn" class="icon-btn" title="Star (s)" aria-label="Star article" disabled>
        <svg class="icon icon-star" viewBox="0 0 24 24" aria-hidden="true"><path d="m12 3.4 2.6 5.4 5.9.8-4.3 4.1 1 5.9-5.2-2.8-5.2 2.8 1-5.9L3.5 9.6l5.9-.8Z"/></svg>
      </button>
      <a id="open-btn" class="icon-btn" href="#" target="_blank" rel="noopener noreferrer" title="Open original (o)" aria-label="Open original article" hidden>
        <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M14 4.5h5.5V10M19.2 4.8l-8 8M19.5 13.5v4.2a1.8 1.8 0 0 1-1.8 1.8H6.3a1.8 1.8 0 0 1-1.8-1.8V6.3a1.8 1.8 0 0 1 1.8-1.8h4.2"/></svg>
      </a>
    </header>
    <div id="reader-scroll">
      <div id="article" hidden></div>
      <div id="reader-empty">
        <svg viewBox="0 0 64 64" aria-hidden="true"><circle cx="21" cy="43" r="5.5"/><path d="M16 28a20 20 0 0 1 20 20" stroke-width="6" fill="none" stroke-linecap="round"/><path d="M16 14a34 34 0 0 1 34 34" stroke-width="6" fill="none" stroke-linecap="round"/></svg>
        <p>No article selected</p>
        <p class="hint">Pick something from the timeline — or use <kbd>j</kbd>/<kbd>k</kbd> to move around.</p>
      </div>
    </div>
  </article>

</div>
<div id="scrim"></div>
<script src="assets/app.js"></script>
</body>
</html>
